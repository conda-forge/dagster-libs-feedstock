    requirements:
      host:
        - hatchling >=1.19.0
        - pip
        - python ${{ python_min }}.*
      run:
        - ${{ dagster }}
        - dbt-core >=1.7,<1.12
        - gitpython
        - jinja2
        - networkx
        - orjson
        - packaging
        - python >=${{ python_min }}
        - requests
        - rich
        - sqlglot-rs <28.1.0
        - typer >=0.9.0
    tests:
      - python:
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - 3.13.*
          imports:
            - dagster_dbt
      - requirements:
          run:
            - python ${{ python_min }}.*
        script:
          - dagster-dbt-cloud --help
          - dagster-dbt --help
    about:
      homepage: https://github.com/dagster-io/dagster/tree/master/python_modules/dagster-dbt
      license: Apache-2.0
      license_file: LICENSE
      summary: A Dagster integration for dbt

  - package:
      name: dagster-deltalake
    source:
      url: https://pypi.org/packages/source/d/dagster-deltalake/dagster_deltalake-${{ version }}.tar.gz
      sha256: 9ebe712a8814500c01970e2a02b78ee04663ddbccf80f1a4ed7b1021ab6befbd
    build:
      noarch: python
      skip: python_min != real_python_min
      script: ${{ PYTHON }} ${{ pip_install }}
    requirements:
      host:
        - hatchling >=1.19.0
        - pip
        - python ${{ python_min }}.*
      run:
        - ${{ dagster }}
        - deltalake >=1.0.0
        - pyarrow
        - python >=${{ python_min }}
    tests:
      - python:
          imports: dagster_deltalake
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - ${{ python_max }}.*
    about:
      homepage: https://github.com/dagster-io/dagster/tree/master/python_modules/dagster-deltalake
      license: Apache-2.0
      license_file: LICENSE
      summary: Package for Deltalake-specific Dagster framework op and resource components.

  - package:
      name: dagster-deltalake-pandas
    source:
      url: https://pypi.org/packages/source/d/dagster-deltalake-pandas/dagster_deltalake_pandas-${{ version }}.tar.gz
      sha256: e2a6ae40b70b358e87d1bd07c1d5f7d420b54c689218f153231aeb45dd96afc7
    build:
      noarch: python
      skip: python_min != real_python_min
      script: ${{ PYTHON }} ${{ pip_install }}
    requirements:
      host:
        - hatchling >=1.19.0
        - pip
        - python ${{ python_min }}.*
      run:
        - ${{ dagster }}
        - ${{ pin_subpackage("dagster-deltalake", upper_bound="x.x.x") }}
        - pandas <3.0.0
        - python >=${{ python_min }}
    tests:
      - python:
          imports: dagster_deltalake_pandas
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - ${{ python_max }}.*
    about:
      homepage: https://github.com/dagster-io/dagster/tree/master/python_modules/dagster-deltalake-pandas
      license: Apache-2.0
      license_file: LICENSE
      summary: Package for storing Pandas DataFrames in Delta tables

  - package:
      name: dagster-deltalake-polars
    source:
      url: https://pypi.org/packages/source/d/dagster-deltalake-polars/dagster_deltalake_polars-${{ version }}.tar.gz
      sha256: 9d4e167c4c1d3bf72bf64ce52425951cdd3391b090f0bdbd2296763ab27057ec
    build:
      noarch: python
      skip: python_min != real_python_min
      script: ${{ PYTHON }} ${{ pip_install }}
    requirements:
      host:
        - hatchling >=1.19.0
        - pip
        - python ${{ python_min }}.*
      run:
        - ${{ dagster }}
        - ${{ pin_subpackage("dagster-deltalake", upper_bound="x.x.x") }}
        - polars
        - pyarrow
        - python >=${{ python_min }}
    tests:
      - python:
          imports: dagster_deltalake_polars
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - ${{ python_max }}.*
    about:
      homepage: https://github.com/dagster-io/dagster/tree/master/python_modules/dagster-deltalake-polars
      license: Apache-2.0
      license_file: LICENSE
      summary: Package for storing Polars DataFrames in Delta tables.

  - package:
      name: dagster-dlt
    source:
      url: https://pypi.org/packages/source/d/dagster-dlt/dagster_dlt-${{ version }}.tar.gz
      sha256: 392eb7bac5ab2306cc0a210b17e10d147e05458af19a3512d7208cf74024e743
    build:
      noarch: python
      skip: python_min != real_python_min
      script: ${{ PYTHON }} ${{ pip_install }}
    requirements:
      host:
        - hatchling >=1.19.0
        - pip
        - python ${{ python_min }}.*
      run:
        - ${{ dagster }}
        - dlt >=0.4
        - python >=${{ python_min }}
    tests:
      - python:
          imports: dagster_dlt
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - 3.13.*
    about:
      homepage: https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-dlt
      license: Apache-2.0
      license_file: LICENSE
      summary: This library provides a Dagster integration with dlt

  - package:
      name: dagster-docker
    source:
      url: https://pypi.org/packages/source/d/dagster-docker/dagster_docker-${{ version }}.tar.gz
      sha256: 60b024f679644929c6d46d288a9fe1e0573e591a34cfcb5063ce43835f00449c
    build:
      noarch: python
      skip: python_min != real_python_min
      script: ${{ PYTHON }} ${{ pip_install }}
    requirements:
      host:
        - hatchling >=1.19.0
        - pip
        - python ${{ python_min }}.*
      run:
        - ${{ dagster }}
        - docker-image-py
        - docker-py
        - python >=${{ python_min }}
    tests:
      - python:
          imports: dagster_docker
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - ${{ python_max }}.*

    about:
      homepage: https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-docker
      license: Apache-2.0
      license_file: LICENSE
      summary: A Dagster integration for docker

  - package:
      name: dagster-duckdb
    source:
      url: https://pypi.org/packages/source/d/dagster-duckdb/dagster_duckdb-${{ version }}.tar.gz
      sha256: 1700f0ee0dfdb28b5c552f51fd01047adbc9760f10f89133c9f0a7fb54fece18
    build:
      noarch: python
      # used by dagster-duckdb-pyspark
      # skip: python_min != real_python_min
      script: ${{ PYTHON }} ${{ pip_install }}
    requirements:
      host:
        - hatchling >=1.19.0
        - pip
        - python ${{ python_min }}.*
      run:
        - ${{ dagster }}
        - python >=${{ python_min }}
        - python-duckdb
    tests:
      - python:
          imports: dagster_duckdb
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - ${{ python_max }}.*
    about:
      homepage: https://github.com/dagster-io/dagster/blob/master/python_modules/dagster-duckdb
      license: Apache-2.0
      license_file: LICENSE
      summary: Package for DuckDB-specific Dagster framework op and resource components.

  - package:
      name: dagster-duckdb-pandas
    source:
      url: https://pypi.org/packages/source/d/dagster-duckdb-pandas/dagster_duckdb_pandas-${{ version }}.tar.gz
      sha256: 3821aba10f9301de2f140522636d7816f32e41100b584c4a330264a2442c49ae
    build:
      noarch: python
      skip: python_min != real_python_min
      script: ${{ PYTHON }} ${{ pip_install }}
    requirements:
      host:
        - hatchling >=1.19.0
        - pip
        - python ${{ python_min }}.*
      run:
        - ${{ dagster }}
        - ${{ pin_subpackage("dagster-duckdb", upper_bound="x.x.x") }}
        - pandas <3.0.0
        - python >=${{ python_min }}
    tests:
      - python:
          imports: dagster_duckdb_pandas
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - ${{ python_max }}.*
    about:
      homepage: https://github.com/dagster-io/dagster/blob/master/python_modules/dagster-duckdb-pandas
      license: Apache-2.0
      license_file: LICENSE
      summary: Package for storing Pandas DataFrames in DuckDB.

  - package:
      name: dagster-duckdb-polars
    source:
      url: https://pypi.org/packages/source/d/dagster-duckdb-polars/dagster_duckdb_polars-${{ version }}.tar.gz
      sha256: 7f090595255df2654d1a6798d01011f382ff63c1e4cdc33ea60d17bc9f393944
    build:
      noarch: python
      skip: python_min != real_python_min
      script: ${{ PYTHON }} ${{ pip_install }}
    requirements:
      host:
        - hatchling >=1.19.0
        - pip
        - python ${{ python_min }}.*
      run:
        - ${{ dagster }}
        - ${{ pin_subpackage("dagster-duckdb", upper_bound="x.x.x") }}
        - polars
        - pyarrow
        - python >=${{ python_min }}
    tests:
      - python:
          imports: dagster_duckdb_polars
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - ${{ python_max }}.*
    about:
      homepage: https://github.com/dagster-io/dagster/blob/master/python_modules/dagster-duckdb-polars
      license: Apache-2.0
      license_file: LICENSE
      summary: Package for storing Polars DataFrames in DuckDB.

  - package:
      name: dagster-duckdb-pyspark
    source:
      url: https://pypi.org/packages/source/d/dagster-duckdb-pyspark/dagster_duckdb_pyspark-${{ version }}.tar.gz
      sha256: b83d70c49ed726e8ef190f2b591b38a64e8c7df40e3f0cbff034f7f86917bb1e
    build:
      noarch: python
      # skip: python_min != real_python_min
      script: ${{ PYTHON }} ${{ pip_install }}
    requirements:
      host:
        - hatchling >=1.19.0
        - pip
        - python ${{ python_min }}.*
      run:
        - ${{ dagster }}
        - ${{ pin_subpackage("dagster-duckdb", upper_bound="x.x.x") }}
        - pandas <3.0.0
        - pyarrow
        - python >=${{ python_min }}
        - if: match(python_min, "<3.14")
          then: pyspark >=3.5,<4
        - if: match(python_min, ">=3.14")
          then: pyspark >=4.1
    tests:
      - python:
          imports: dagster_duckdb_pyspark
          pip_check: true
          python_version:
            - ${{ python_min }}.*
    about:
      homepage: https://github.com/dagster-io/dagster/blob/master/python_modules/dagster-duckdb-pyspark
      license: Apache-2.0
      license_file: LICENSE
      summary: Package for storing PySpark DataFrames in DuckDB.

  # E
  # F
  - package:
      name: dagster-fivetran
    source:
      url: https://pypi.org/packages/source/d/dagster-fivetran/dagster_fivetran-${{ version }}.tar.gz
      sha256: 9232c0554b8a6cda8c5830c8dd8873a6c58fcda8f161804cec4356e6223b504a
    build:
      noarch: python
      skip: python_min != real_python_min
      script: ${{ PYTHON }} ${{ pip_install }}
      python:
        entry_points:
          - dagster-fivetran = dagster_fivetran.cli:main
    requirements:
      host:
        - hatchling >=1.19.0
        - pip
        - python ${{ python_min }}.*
      run:
        - ${{ dagster }}
        - python >=${{ python_min }}
    tests:
      - python:
          imports: dagster_fivetran
          pip_check: true
          python_version:
            - ${{ python_min }}.*
            - ${{ python_max }}.*
      - requirements:
          run:
            - python ${{ python_min }}.*
        script:
          - dagster-fivetran --help
    about:
      homepage: https://github.com/dagster-io/dagster/tree/master/python_modules/libraries/dagster-fivetran
      license: Apache-2.0
      license_file: LICENSE
      summary: Package for integrating Fivetran with Dagster.

  # G
  - package:
      name: dagster-gcp
